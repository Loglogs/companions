    <rect x="80" y="228" width="260" height="238" rx="28" fill="#FBF6ED"/>
    <rect x="390" y="228" width="260" height="238" rx="28" fill="#FBF6ED"/>
    <rect x="750" y="228" width="260" height="238" rx="28" fill="#FBF6ED"/>
